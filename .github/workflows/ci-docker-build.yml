name: Docker Image CI

on:
  push:
    tags:
      - "*"
  workflow_dispatch:
    inputs:
      vsix_version:
        description: "Claude Code VSIX version (e.g. 2.1.86). Leave empty for latest."
        required: false
        default: ""

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push-image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set image name and tag
        id: image
        run: |
          echo "name=${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="manual-$(echo ${{ github.sha }} | cut -c1-7)"
          else
            TAG="${{ github.ref_name }}"
          fi
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Determine VSIX version
        id: vsix
        run: |
          VERSION="${{ inputs.vsix_version }}"
          if [ -z "$VERSION" ]; then
            VERSION=$(curl --fail -s 'https://marketplace.visualstudio.com/_apis/public/gallery/extensionquery' \
              -H 'Content-Type: application/json' \
              -H 'Accept: application/json;api-version=6.1-preview.1' \
              -d '{"filters":[{"criteria":[{"filterType":7,"value":"anthropic.claude-code"}]}],"flags":950}' \
              | jq -r '.results[0].extensions[0].versions[0].version')
            echo "Auto-detected latest VSIX version: $VERSION"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Download and extract platform-specific VSIX packages
        run: |
          VSIX_VERSION="${{ steps.vsix.outputs.version }}"
          VSIX_BASE_URL="https://marketplace.visualstudio.com/_apis/public/gallery/publishers/anthropic/vsextensions/claude-code/${VSIX_VERSION}/vspackage"
          BINARY_DIR="vendor/claude-code/resources/native-binary"

          # Download linux-x64 VSIX first — use its webview/extension assets as the base
          echo "Downloading Claude Code VSIX v${VSIX_VERSION} (linux-x64)..."
          curl --fail -L -o claude-code-linux-x64.vsix "${VSIX_BASE_URL}?targetPlatform=linux-x64"
          ls -lh claude-code-linux-x64.vsix

          rm -rf vendor/claude-code
          mkdir -p vendor/claude-code
          unzip -q claude-code-linux-x64.vsix -d temp-extract
          mv temp-extract/extension/* vendor/claude-code/
          rm -rf temp-extract claude-code-linux-x64.vsix
          echo "Vendor version: $(grep '"version"' vendor/claude-code/package.json)"

          # Rename the x64 binary
          mv "$BINARY_DIR/claude" "$BINARY_DIR/claude-amd64"
          chmod +x "$BINARY_DIR/claude-amd64"
          echo "linux-x64 binary:"
          file "$BINARY_DIR/claude-amd64"

          # Download linux-arm64 VSIX — only extract the binary
          echo "Downloading Claude Code VSIX v${VSIX_VERSION} (linux-arm64)..."
          curl --fail -L -o claude-code-linux-arm64.vsix "${VSIX_BASE_URL}?targetPlatform=linux-arm64"
          unzip -q claude-code-linux-arm64.vsix -d temp-arm64
          cp temp-arm64/extension/resources/native-binary/claude "$BINARY_DIR/claude-arm64"
          chmod +x "$BINARY_DIR/claude-arm64"
          echo "linux-arm64 binary:"
          file "$BINARY_DIR/claude-arm64"
          rm -rf temp-arm64 claude-code-linux-arm64.vsix

          # Clean up compressed variants
          rm -f "$BINARY_DIR/claude.zst" "$BINARY_DIR/claude.app.tar.zst" 2>/dev/null || true

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          provenance: false
          tags: |
            ${{ env.REGISTRY }}/${{ steps.image.outputs.name }}:${{ steps.image.outputs.tag }}
            ${{ env.REGISTRY }}/${{ steps.image.outputs.name }}:latest
