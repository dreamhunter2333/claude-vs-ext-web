<!DOCTYPE html>
<html lang="en" class="{{THEME_CLASS}}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0d1117">
  <link rel="icon" type="image/png" sizes="192x192" href="/static/icon-192.png">
  <link rel="icon" type="image/png" sizes="512x512" href="/static/icon-512.png">
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/static/apple-touch-icon-180x180.png">
  <link rel="apple-touch-icon" sizes="152x152" href="/static/apple-touch-icon-152x152.png">
  <link rel="apple-touch-icon" sizes="120x120" href="/static/apple-touch-icon-120x120.png">
  <link rel="apple-touch-icon" sizes="76x76" href="/static/apple-touch-icon-76x76.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Claude Code">
  <title>Claude Code</title>
  <link href="/webview/index.css" rel="stylesheet">
  <link href="/static/css-variables.css" rel="stylesheet">
  <style>
    html, body { margin: 0; padding: 0; height: 100dvh; overflow: hidden; }
    body { background: var(--vscode-editor-background); color: var(--vscode-foreground); }

    /* Mobile: touch-action manipulation prevents 300ms delay and double-tap zoom */
    input, textarea, select, [contenteditable] {
      touch-action: manipulation;
    }
    .vscode-dark { color-scheme: dark; }
    .vscode-light { color-scheme: light; }

    /* Navigation bar */
    .web-cc-nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 36px;
      padding: 0 12px;
      background: var(--vscode-sideBar-background, #252526);
      border-bottom: 1px solid var(--vscode-panel-border, #80808059);
      font-size: 13px;
      flex-shrink: 0;
    }
    .web-cc-nav-left {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .web-cc-nav-left a {
      color: var(--vscode-textLink-foreground, #3794ff);
      text-decoration: none;
      font-size: 13px;
    }
    .web-cc-nav-left a:hover {
      text-decoration: underline;
    }
    .web-cc-nav-left .nav-separator {
      color: var(--vscode-descriptionForeground, #ccccccb3);
    }
    .web-cc-nav-left .nav-project {
      color: var(--vscode-foreground, #cccccc);
      font-weight: 500;
      max-width: 300px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .web-cc-nav-right {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .web-cc-nav-right .nav-theme-btn {
      background: none;
      border: 1px solid var(--vscode-button-secondaryBackground, #3a3d41);
      color: var(--vscode-foreground, #cccccc);
      padding: 4px 12px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 15px;
      min-width: 32px;
      min-height: 28px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }
    .web-cc-nav-right .nav-theme-btn:hover {
      background: var(--vscode-button-secondaryHoverBackground, #45494e);
    }
    .theme-icon {
      display: inline-block;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      border: 1.5px solid currentColor;
      background: linear-gradient(to right, currentColor 50%, transparent 50%);
    }

    /* Layout wrapper */
    .web-cc-wrapper {
      display: flex;
      flex-direction: column;
      height: 100%;
      width: 100%;
      max-width: 100vw;
      overflow: hidden;
    }
    #root {
      flex: 1;
      min-height: 0;
      width: 100%;
      max-width: 100%;
      overflow: hidden;
    }

  </style>
</head>
<body class="{{THEME_CLASS}}">
  <div class="web-cc-wrapper">
    <nav class="web-cc-nav">
      <div class="web-cc-nav-left">
        <img src="/resources/clawd.svg" alt="Claude" class="nav-logo" style="width:20px;height:20px;border-radius:4px;">
        <a href="/">← Projects</a>
        <span class="nav-separator">/</span>
        <span class="nav-project" title="{{PROJECT_PATH}}">{{PROJECT_NAME}}</span>
      </div>
      <div class="web-cc-nav-right">
        <button class="nav-theme-btn" id="themeBtn" onclick="toggleTheme()" title="Theme"><span class="theme-icon"></span></button>
        <button class="nav-theme-btn" onclick="location.reload()" title="Reload">&#x21BB;</button>
      </div>
    </nav>
    <div id="root" {{ROOT_DATA_ATTRS}}></div>
  </div>
  <script>
    // Configuration injected by server
    window.WEB_CC_CONFIG = {
      projectPath: "{{PROJECT_PATH_JS}}",
      wsUrl: "{{WS_URL}}",
      permissionMode: "{{PERMISSION_MODE}}"
    };

    // Apply theme class to both html and body elements.
    // The webview's index.css defines --app-* variables on the `html` selector,
    // resolving var(--vscode-*) from the html element. So we must set the theme
    // class on documentElement (html) as well as body for CSS variable override
    // and MutationObserver detection to both work correctly.
    function applyTheme(theme) {
      var cls = theme === 'light' ? 'vscode-light' : 'vscode-dark';
      document.documentElement.classList.remove('vscode-dark', 'vscode-light');
      document.documentElement.classList.add(cls);
      document.body.classList.remove('vscode-dark', 'vscode-light');
      document.body.classList.add(cls);
    }

    // Restore theme from localStorage before first paint
    (function() {
      var saved = localStorage.getItem('web-cc-theme');
      if (saved === 'light' || saved === 'dark') {
        applyTheme(saved);
      }
    })();

    // Theme toggle
    function toggleTheme() {
      var isLight = document.body.classList.contains('vscode-light');
      var newTheme = isLight ? 'dark' : 'light';
      applyTheme(newTheme);
      localStorage.setItem('web-cc-theme', newTheme);
    }
  </script>
  <script src="/static/shim.js"></script>
  <script src="/webview/index.js"></script>
  <script>
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("/sw.js");
    }
  </script>
</body>
</html>
